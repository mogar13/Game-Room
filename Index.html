<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Game Shack</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111111">
  <meta name="color-scheme" content="dark">
  <link rel="stylesheet" href="hub-style.css">
</head>
<body>

  <div class="profile-banner">
    <div class="profile-left">
      <span class="profile-icon">👤</span> 
      <span id="display-player-name">Player</span>
    </div>
    <div class="profile-right" style="display: flex; align-items: center;">
      <span class="profile-icon">💰</span> 
      $<span id="display-player-money">5000</span>
      <button id="daily-bonus-btn" class="hub-interactive">Claim +$1,000</button>
    </div>
  </div>

  <header>
    <div class="logo-container">
        <h1 class="shack-title" data-text="THE GAME SHACK">THE GAME SHACK</h1>
    </div>
    
    <div class="search-container">
        <input type="text" id="game-search" class="hub-interactive" placeholder="Search games...">
    </div>
    
    <div class="category-filters">
        <button class="cat-btn active-cat hub-interactive" data-filter="all">All Games</button>
        <button class="cat-btn hub-interactive" data-filter="casino">Casino Floor</button>
        <button class="cat-btn hub-interactive" data-filter="board">Board & Logic</button>
    </div>
    
    <div class="theme-selector" style="margin-top: 20px;">
      <button onclick="changeTheme('default')" id="btn-theme-default" class="hub-interactive">Night Mode</button>
      <button onclick="changeTheme('casino')" id="btn-theme-casino" class="hub-interactive">Casino Felt</button>
      <button onclick="changeTheme('arcade')" id="btn-theme-arcade" class="hub-interactive">Deep Arcade</button>
    </div>
  </header>

  <div id="carousel-wrapper">
      <button class="nav-btn hub-interactive" id="prev-page">◄</button>
      
      <main class="game-grid" id="game-grid">
        
        <a href="games/blackjack/blackjack.html" class="game-card hub-interactive" data-name="blackjack cards 21 dealer" data-cat="casino">
          <div class="card-icon" style="background-image: url('system/images/cards/standard/cardSpadesA.png');"></div>
          <h2>Blackjack</h2>
          <div class="card-badges"><span class="badge b-solo">🤖 Solo</span> <span class="badge b-casino">🎰 Casino</span></div>
        </a>

        <a href="games/tic-tac-toe/ttt.html" class="game-card hub-interactive" data-name="tic tac toe x o multiplayer" data-cat="board">
          <div class="card-icon" style="background-image: url('system/images/icons/ttt-icon.png');"></div>
          <h2>Tic-Tac-Toe</h2>
          <div class="card-badges"><span class="badge b-online">👥 Online</span></div>
        </a>

        <a href="games/rps/rps.html" class="game-card hub-interactive" data-name="rps rock paper scissors" data-cat="board">
          <div class="card-icon" style="background-image: url('system/images/icons/rps-icon.png');"></div>
          <h2>RPS</h2>
          <div class="card-badges"><span class="badge b-solo">🤖 Solo</span></div>
        </a>

        <a href="games/memory/memory.html" class="game-card hub-interactive" data-name="memory match cards pairs" data-cat="board">
          <div class="card-icon" style="background-image: url('system/images/cards/standard/cardBack_red2.png'); border-radius: 5px;"></div>
          <h2>Memory</h2>
          <div class="card-badges"><span class="badge b-online">👥 Online</span></div>
        </a>

        <a href="games/slots/slots.html" class="game-card hub-interactive" data-name="slots spin high roller casino" data-cat="casino">
          <div class="card-icon" style="background-image: url('system/images/icons/slots-icon.png'); border-radius: 8px;"></div>
          <h2>High-Roller Slots</h2>
          <div class="card-badges"><span class="badge b-solo">🤖 Solo</span> <span class="badge b-casino">🎰 Casino</span></div>
        </a>

        <a href="games/roulette/roulette.html" class="game-card hub-interactive" data-name="roulette spin wheel casino" data-cat="casino">
          <div class="card-icon" style="background-image: url('system/images/wheel.png'); border-radius: 50%;"></div>
          <h2>Roulette</h2>
          <div class="card-badges"><span class="badge b-solo">🤖 Solo</span> <span class="badge b-casino">🎰 Casino</span></div>
        </a>

        <a href="games/connect4/c4.html" class="game-card hub-interactive" data-name="connect 4 four multiplayer" data-cat="board">
          <div class="card-icon" style="background-image: url('system/images/pieces/yellow/pieceYellow_border10.png');"></div>
          <h2>Connect 4</h2>
          <div class="card-badges"><span class="badge b-online">👥 Online</span></div>
        </a>

        <a href="games/snakes-and-ladders/snl.html" class="game-card hub-interactive" data-name="snakes ladders chutes multiplayer" data-cat="board">
          <div class="card-icon" style="background-image: url('system/images/icons/snl-icon.png');"></div>
          <h2>Snakes & Ladders</h2>
          <div class="card-badges"><span class="badge b-online">👥 Online</span></div>
        </a>

        <a href="games/battleship/battleship.html" class="game-card hub-interactive" data-name="battleship navy ships multiplayer" data-cat="board">
          <div class="card-icon" style="background-image: url('system/images/icons/battleship-icon.png');"></div>
          <h2>Battleship</h2>
          <div class="card-badges"><span class="badge b-online">👥 Online</span></div>
        </a>

          <a href="games/yahtzee/yahtzee.html" class="game-card hub-interactive" data-name="yahtzee die game" data-cat="board">
          <div class="card-icon" style="background-image: url('system/images/icons/icon2.png');"></div>
          <h2>Yahtzee</h2>
          <div class="card-badges"><span class="badge b-online">👥 Online</span></div>
        </a>
      </main>

      <button class="nav-btn hub-interactive" id="next-page">►</button>
  </div>
  
  <div id="pagination-dots"></div>
  
  <script src="system/player_name.js"></script>
  <script src="hub_app.js"></script>
</body>
</html>
