<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111111">
  <meta name="color-scheme" content="dark">
  <title>RPS Casino</title>
  <link rel="stylesheet" href="../../system/system_ui.css"> 
  <link rel="stylesheet" href="rps_style.css">
</head>
<body>

  <div id="game-container">
    
    <div id="arena">
      <div id="streak-counter" style="position:absolute; top:-10px; left:0px; background:rgba(0,0,0,0.6); padding:5px 10px; border-radius:10px; color:#f1c40f; font-weight:bold; z-index:5; border: 1px solid #f1c40f; font-size: 0.9rem;">
        🔥 Streak: <span id="streak-val">0</span>
      </div>

      <div class="hand-container">
        <span class="label">CPU</span>
        <div class="hand-box" id="cpu-hand">
          <img src="../../system/images/icons/rock.png" id="cpu-img">
        </div>
      </div>

      <div id="result-overlay" class="hidden">
        <h1 id="status-text">WINNER!</h1>
      </div>

      <div class="hand-container">
        <div class="hand-box" id="player-hand">
          <img src="../../system/images/icons/rock.png" id="player-img">
        </div>
        <span class="label">YOU</span>
      </div>
    </div>

    <div id="controls">
      <div id="os-betting-rack" style="width: 100%; max-width: 400px; margin-bottom: 20px;"></div>

      <div id="action-zone">
        <button class="choice-btn" id="rock" disabled><img src="../../system/images/icons/rock.png"></button>
        <button class="choice-btn" id="paper" disabled><img src="../../system/images/icons/paper.png"></button>
        <button class="choice-btn" id="scissors" disabled><img src="../../system/images/icons/scissors.png"></button>
      </div>
    </div>
  </div>

  <script src="../../system/system_ui.js"></script> 
  <script src="rps_app.js"></script>
</body>
</html>
