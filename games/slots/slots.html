<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pro Video Slots</title>
  <link rel="stylesheet" href="../../system/system_ui.css"> 
  <link rel="stylesheet" href="slots_style.css">
</head>
<body>

  <div id="game-container">
    
    <div id="video-slot-machine">
      <div class="machine-header">
        <div class="machine-title">Lucky Slots</div>
        <div class="header-controls">
          <button id="btn-paytable">ⓘ INFO</button>
        </div>
      </div>
      
      <div class="machine-core">
        <div class="line-indicators left-lines">
          <button class="line-btn active" data-line="2">2</button>
          <button class="line-btn active" data-line="1">1</button>
          <button class="line-btn active" data-line="3">3</button>
        </div>

        <div class="reels-board">
          <div class="reel-col"><div class="reel-strip" id="strip-1"></div></div>
          <div class="reel-col"><div class="reel-strip" id="strip-2"></div></div>
          <div class="reel-col"><div class="reel-strip" id="strip-3"></div></div>
          <div class="reel-col"><div class="reel-strip" id="strip-4"></div></div>
          <div class="reel-col"><div class="reel-strip" id="strip-5"></div></div>
        </div>

        <div class="line-indicators right-lines">
          <button class="line-btn active" data-line="4">4</button>
          <button class="line-btn active" data-line="5">5</button>
        </div>
      </div>

      <div class="control-deck">
        <div class="deck-panel">
          <span class="label">BASE BET</span>
          <span class="value" id="deck-base-bet">0</span>
        </div>
        <div class="deck-panel">
          <span class="label">LINES</span>
          <span class="value" id="deck-lines">5</span>
        </div>
        <div class="deck-panel center-panel">
           <button id="btn-spin" disabled>SPIN</button>
        </div>
        <div class="deck-panel">
          <span class="label">TOTAL BET</span>
          <span class="value" id="deck-total-bet">0</span>
        </div>
        <div class="deck-panel">
          <span class="label">WIN</span>
          <span class="value win-text" id="deck-win">0</span>
        </div>
      </div>
    </div>

    <div id="os-betting-rack" style="width: 100%; max-width: 600px;"></div>

  </div>

  <script src="../../system/system_ui.js"></script> 
  <script src="slots_app.js"></script>
</body>
</html>
