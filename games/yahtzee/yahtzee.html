<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111111">
  <meta name="color-scheme" content="dark">
  <title>Yahtzee Casino</title>
  <link rel="stylesheet" href="../../system/system_ui.css">
  <link rel="stylesheet" href="yahtzee_style.css">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, child } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAaQ95UV63kEN4DD-HT35G9VNJVnVw9XFM",
      databaseURL: "https://game-room-26e34-default-rtdb.firebaseio.com",
      authDomain: "game-room-26e34.firebaseapp.com",
      projectId: "game-room-26e34",
      storageBucket: "game-room-26e34.firebasestorage.app",
      messagingSenderId: "769541427914",
      appId: "1:769541427914:web:b7e7bb87c160a5b8cfda33"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    window.db = database;
    window.dbRef = ref;
    window.dbSet = set;
    window.dbOnValue = onValue;
    window.dbUpdate = update;
    window.dbGet = get;
    window.dbChild = child;
  </script>
</head>
<body>

  <div id="game-container">

    <div id="stats-bar">
      <div class="stat-box" id="p1-stat">
        <span class="stat-label" id="p1-label">You</span>
        <span class="stat-score" id="p1-score">0</span>
      </div>
      <div id="round-badge">
        <span id="round-label">Round</span>
        <span id="round-display">—</span>
      </div>
      <div class="stat-box" id="p2-stat">
        <span class="stat-label" id="p2-label">AI</span>
        <span class="stat-score" id="p2-score">0</span>
      </div>
    </div>

    <div id="turn-banner" class="hidden">Your Turn</div>

    <div id="dice-section">
      <div id="dice-tray">
        <!-- dice injected by JS -->
      </div>
      <div id="roll-info" class="hidden">
        <span id="rolls-left-text">3 rolls left</span>
        <span id="kept-hint">· tap dice to keep</span>
      </div>
    </div>

    <div id="action-row">
      <button id="roll-btn" class="hidden">🎲 ROLL</button>
      <button id="scorecard-toggle-btn" class="hidden">📋 SCORECARD</button>
    </div>

    <div id="controls">
      <button id="start-game-btn">BUY IN ($200)</button>
    </div>

  </div>

  <!-- Slide-up scorecard panel -->
  <div id="scorecard-panel">
    <div id="scorecard-handle">
      <div id="scorecard-title">SCORECARD</div>
      <button id="scorecard-close-btn">✕</button>
    </div>
    <div id="scorecard-inner">
      <!-- injected by JS -->
    </div>
  </div>
  <div id="scorecard-backdrop" class="hidden"></div>

  <div id="toast-modal" class="hidden modal-overlay">
    <div id="modal-box" class="toast-box">
      <h2 id="modal-title">Result</h2>
      <p id="modal-message">Message goes here.</p>
    </div>
  </div>

  <script src="../../system/system_ui.js"></script>
  <script src="yahtzee_app.js"></script>
</body>
</html>
