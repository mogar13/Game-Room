<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe Pro</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111111">
  <meta name="color-scheme" content="dark">
  
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, child } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyAaQ95UV63kEN4DD-HT35G9VNJVnVw9XFM",
      databaseURL: "https://game-room-26e34-default-rtdb.firebaseio.com", // <-- DON'T FORGET THIS LINE!
      authDomain: "game-room-26e34.firebaseapp.com",
      projectId: "game-room-26e34",
      storageBucket: "game-room-26e34.firebasestorage.app",
      messagingSenderId: "769541427914",
      appId: "1:769541427914:web:b7e7bb87c160a5b8cfda33"
    };
    
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    
    // Attach database tools to the window so our ttt_app.js file can use them!
    window.db = database;
    window.dbRef = ref;
    window.dbSet = set;
    window.dbOnValue = onValue;
    window.dbUpdate = update;
    window.dbGet = get;
    window.dbChild = child;
  </script>

  <link rel="stylesheet" href="../../system/system_ui.css"> 
  <link rel="stylesheet" href="ttt_style.css">
</head>
<body>

  <div id="game-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh;">
      <h2 id="status-display">Let's Play!</h2>

      <div id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>

      <div class="controls">
        <button id="restart-btn">Restart Game</button>
      </div>
  </div>

  <script src="../../system/system_ui.js"></script> 
  <script src="ttt_app.js"></script>
</body>
</html>
