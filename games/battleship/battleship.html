<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111111">
  <meta name="color-scheme" content="dark">
  <title>Battleship Pro</title>
  <link rel="stylesheet" href="../../system/system_ui.css">
  <link rel="stylesheet" href="battleship_style.css">
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, child } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
    const firebaseConfig = {
      apiKey: "AIzaSyAaQ95UV63kEN4DD-HT35G9VNJVnVw9XFM",
      databaseURL: "https://game-room-26e34-default-rtdb.firebaseio.com", 
      authDomain: "game-room-26e34.firebaseapp.com",
      projectId: "game-room-26e34",
      storageBucket: "game-room-26e34.firebasestorage.app",
      messagingSenderId: "769541427914",
      appId: "1:769541427914:web:b7e7bb87c160a5b8cfda33"
    };
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    window.db = database; window.dbRef = ref; window.dbSet = set;
    window.dbOnValue = onValue; window.dbUpdate = update;
    window.dbGet = get; window.dbChild = child;
  </script>
</head>
<body>
  <div id="game-container">
    <div id="game-header">
        <h2 id="status-display">PLACE YOUR FLEET</h2>
        <div id="ship-selector">
            <div class="ship-grid">
                <button class="ship-btn" data-size="5" data-name="Carrier">Carrier (5)</button>
                <button class="ship-btn" data-size="4" data-name="Battleship">Battleship (4)</button>
                <button class="ship-btn" data-size="3" data-name="Destroyer">Destroyer (3)</button>
                <button class="ship-btn" data-size="3" data-name="Sub">Sub (3)</button>
                <button class="ship-btn" data-size="2" data-name="Patrol">Patrol (2)</button>
            </div>
            <div class="tool-grid">
                <button id="rotate-btn" class="tool-btn">HORIZONTAL</button>
                <button id="delete-mode-btn" class="tool-btn delete-off">DELETE: OFF</button>
                <button id="clear-board-btn" class="tool-btn danger">CLEAR ALL</button>
            </div>
        </div>
    </div>

    <div class="boards-container">
        <div class="board-wrapper">
            <h3>MY FLEET</h3>
            <div id="player-board" class="board"></div>
        </div>
        <div class="board-wrapper">
            <h3>RADAR (ATTACK)</h3>
            <div id="opponent-board" class="board"></div>
        </div>
    </div>

    <div class="controls">
      <button id="fire-btn" class="sys-btn" disabled>🔥 READY TO FIGHT</button>
      <button id="auto-place-btn" class="sys-btn">🎲 AUTO-PLACE</button>
      <button id="restart-btn" class="sys-btn" style="background:#555;">🔄 RESTART</button>
    </div>
  </div>

  <script src="../../system/system_ui.js"></script>
  <script src="battleship_app.js"></script>
</body>
</html>
