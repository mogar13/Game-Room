<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111111">
  <meta name="color-scheme" content="dark">
  <title>Dominoes Pro — The Game Shack</title>
  <link rel="stylesheet" href="../../system/system_ui.css">
  <link rel="stylesheet" href="domino_style.css">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, child } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyAaQ95UV63kEN4DD-HT35G9VNJVnVw9XFM",
      databaseURL: "https://game-room-26e34-default-rtdb.firebaseio.com", 
      authDomain: "game-room-26e34.firebaseapp.com",
      projectId: "game-room-26e34",
      storageBucket: "game-room-26e34.firebasestorage.app",
      messagingSenderId: "769541427914",
      appId: "1:769541427914:web:b7e7bb87c160a5b8cfda33"
    };
    
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    
    window.db = database;
    window.dbRef = ref;
    window.dbSet = set;
    window.dbOnValue = onValue;
    window.dbUpdate = update;
    window.dbGet = get;
    window.dbChild = child;
  </script>
</head>
<body>

  <div id="side-picker-modal" class="hidden">
    <div class="side-picker-box">
      <h3>WHICH SIDE?</h3>
      <div class="side-options">
        <button id="btn-play-left" class="sys-btn">PLAY LEFT</button>
        <button id="btn-play-right" class="sys-btn">PLAY RIGHT</button>
      </div>
      <button id="btn-cancel-play" class="sys-btn" style="background:#e74c3c; margin-top: 15px; border: 2px solid white;">CANCEL</button>
    </div>
  </div>

  <div id="game-container">
    
    <div id="opponent-area" class="player-area">
      <h3 id="p2-label">Opponent: <span id="p2-bone-count">0</span> tiles</h3>
      <div id="opponent-hand" class="hand hidden-hand"></div>
    </div>

    <div id="center-table">
      <div id="board-hud">
        <div id="boneyard" class="boneyard-pile hidden">
          <div class="domino-back"></div>
          <div id="boneyard-count" class="count-bubble">14</div>
        </div>
        <div id="turn-banner" class="hidden">Waiting for players...</div>
      </div>

      <div id="domino-board" class="board-area">
          <div id="domino-train" class="train-container"></div>
      </div>

      <div id="move-log-container" class="hidden">
        <div id="move-log"></div>
      </div>
    </div>

    <div id="player-area" class="player-area">
      <h3 id="p1-label">You</h3>
      <div id="player-hand" class="hand"></div>
    </div>

    <div class="controls">
      <button id="start-game-btn" class="sys-btn">Start Game</button>
      <button id="pass-turn-btn" class="sys-btn hidden" style="background:#e74c3c; color:white; border: 2px solid white;">Knock (Pass)</button>
    </div>

  </div>

  <script src="../../system/system_ui.js"></script>
  <script src="domino_app.js"></script>
</body>
</html>
