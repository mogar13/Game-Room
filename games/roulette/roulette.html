<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Casino Roulette</title>
  <link rel="stylesheet" href="../../system/system_ui.css"> 
  <link rel="stylesheet" href="roulette_style.css">
</head>
<body>

  <div id="game-container">
    
    <div id="wheel-section">
        <img src="../../system/images/wheel.png" id="roulette-wheel" alt="Roulette Wheel">
        <div id="ball-track">
            <div id="roulette-ball"></div>
        </div>
    </div>

    <div class="table-scroll-wrapper">
        <div id="betting-table">
            <div id="numbers-grid">
                <div class="cell green" id="zero-cell" data-num="0">0</div>
            </div>
            
            <div id="outside-bets">
                <div class="bet-area" data-type="1st12">1st 12</div>
                <div class="bet-area" data-type="2nd12">2nd 12</div>
                <div class="bet-area" data-type="3rd12">3rd 12</div>
            </div>
            <div id="outside-bets-bottom">
                <div class="bet-area" data-type="even">EVEN</div>
                <div class="bet-area red" data-type="red">RED</div>
                <div class="bet-area black" data-type="black">BLACK</div>
                <div class="bet-area" data-type="odd">ODD</div>
            </div>
        </div>
    </div>

    <div id="controls">
        <div id="os-betting-rack"></div>
        <button id="spin-btn">SPIN WHEEL</button>
    </div>
  </div>

  <div id="toast-modal" class="hidden modal-overlay">
    <div id="modal-box" class="toast-box">
      <h2 id="modal-title">Result</h2>
      <p id="modal-message">Message goes here.</p>
    </div>
  </div>

  <script src="../../system/system_ui.js"></script> 
  <script src="roulette_app.js"></script>
</body>
</html>
