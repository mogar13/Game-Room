<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snakes & Ladders Pro</title>
  <link rel="stylesheet" href="../../system/system_ui.css">
  <link rel="stylesheet" href="snl_style.css">
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, child } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
    const firebaseConfig = {
      apiKey: "AIzaSyAaQ95UV63kEN4DD-HT35G9VNJVnVw9XFM",
      databaseURL: "https://game-room-26e34-default-rtdb.firebaseio.com", 
      authDomain: "game-room-26e34.firebaseapp.com",
      projectId: "game-room-26e34",
      storageBucket: "game-room-26e34.firebasestorage.app",
      messagingSenderId: "769541427914",
      appId: "1:769541427914:web:b7e7bb87c160a5b8cfda33"
    };
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    window.db = database; window.dbRef = ref; window.dbSet = set;
    window.dbOnValue = onValue; window.dbUpdate = update;
    window.dbGet = get; window.dbChild = child;
  </script>
</head>
<body>
  <div id="multiplayer-lobby" class="hidden">
    <div class="lobby-box">
      <button id="lobby-close-btn" style="position:absolute; top:10px; right:10px; background:none; border:none; color:#f1c40f; font-size:1.5rem; cursor:pointer;">&times;</button>
      
      <h2>MULTI-CLIMB LOBBY</h2>
      
      <div class="lobby-section">
        <h3>HOST A GAME</h3>
        <button id="btn-create-room" class="lobby-btn primary">CREATE NEW ROOM</button>
        <div id="room-code-display" class="hidden">
          Room Code: <span id="host-room-id" class="highlight"></span>
          <p class="waiting-text">Waiting for opponent...</p>
        </div>
      </div>

      <div class="lobby-divider">OR</div>

      <div class="lobby-section">
        <h3>JOIN A GAME</h3>
        <input type="text" id="join-room-input" placeholder="Enter 4-Digit Code" maxlength="4">
        <button id="btn-join-room" class="lobby-btn secondary">JOIN ROOM</button>
      </div>
      
      <p id="lobby-error-msg" class="error-text"></p>
      
      <button id="btn-cancel-lobby" class="lobby-btn" style="background:#444; margin-top:10px;">BACK TO LOCAL PLAY</button>
    </div>
  </div>

  <div id="game-container">
    <div id="game-header">
        <h2 id="status-display">SQUARE: 1</h2>
        <div id="dice-container">
            <img id="die-img" src="../../system/images/dice/dieWhite_border1.png">
        </div>
    </div>
    <div id="board-wrapper">
        <div id="board"></div>
    </div>
    <div class="controls">
      <button id="roll-btn" class="sys-btn">🎲 ROLL DICE</button>
    </div>
  </div>
  <script src="../../system/system_ui.js"></script>
  <script src="snl_app.js"></script>
</body>
</html>
