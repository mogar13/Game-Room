<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111111">
  <meta name="color-scheme" content="dark">
  <title>Blackjack Pro</title>
  <link rel="stylesheet" href="../../system/system_ui.css"> 
  <link rel="stylesheet" href="bj_style.css">
</head>
<body>

  <div id="table">
    
    <div id="table-stats-container" style="position:absolute; top:15px; left:15px; display:flex; flex-direction:column; gap:10px; z-index:5;">
      <div id="streak-counter" style="background:rgba(0,0,0,0.6); padding:5px 10px; border-radius:10px; color:#f1c40f; font-weight:bold; border: 1px solid #f1c40f; font-size: 0.9rem;">
        🔥 Streak: <span id="streak-val">0</span>
      </div>
      <div id="table-pot-display" class="hidden" style="background:rgba(0,0,0,0.6); padding:5px 10px; border-radius:10px; color:#3498db; font-weight:bold; border: 1px solid #3498db; font-size: 0.9rem; text-align: center;">
        POT: $0
      </div>
    </div>

    <div class="dealer-tray">
      <div class="chip-rows"></div>
    </div>
    <div class="dealer-shoe">
      <div class="shoe-glass"></div>
      <div class="shoe-opening"></div>
    </div>

    <div class="card-area" id="dealer-area">
      <div id="dealer-score" class="score-bubble hidden">0</div>
      <div id="dealer-cards" class="card-container"></div>
      <div id="dealer-bet-chips"></div>
    </div>

    <div class="table-text">
      <h1>BLACKJACK PAYS 3 TO 2</h1>
      <h2 id="dealer-rule-text">Dealer must draw to 16 and stand on 17</h2>
      <h3>INSURANCE PAYS 2 TO 1</h3>
    </div>

    <div class="boxes-arc">
      <div class="box-slot slot-4">
        <div id="table-bet-chips"></div> 
      </div>
    </div>

    <div class="card-area" id="player-area">
      <div id="player-score" class="score-bubble hidden">0</div>
      <div id="player-cards" class="card-container"></div>
    </div>
  </div>

  <div id="action-zone">
    <div id="betting-controls">
      <div id="os-betting-rack"></div>
      <button id="deal-btn" class="action-btn primary-btn" disabled>DEAL</button>
    </div>

    <div id="playing-controls" class="hidden">
      <div class="button-grid">
        <button id="split-btn" class="action-btn split-btn" disabled>Split</button>
        <button id="hit-btn" class="action-btn hit-btn">Hit</button>
        <button id="double-btn" class="action-btn double-btn">Double Down</button>
        <button id="stand-btn" class="action-btn stand-btn">Stand</button>
      </div>
      <button id="insurance-btn" class="action-btn insurance-btn hidden">Buy Insurance</button>
    </div>
  </div>

  <div id="toast-modal" class="hidden modal-overlay">
    <div id="modal-box" class="toast-box">
      <h2 id="modal-title">Result</h2>
      <p id="modal-message">Message goes here.</p>
    </div>
  </div>

  <script src="../../system/system_ui.js"></script> 
  <script src="bj_app.js"></script>
</body>
</html>
